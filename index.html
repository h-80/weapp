<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>We App</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #25d366; --dark: #075e54; --light: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* شاشة تسجيل الملف الشخصي */
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .user-pic-upload { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--main); margin: 0 auto 15px; cursor: pointer; position: relative; overflow: hidden; }
        .user-pic-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* واجهة التطبيق - المحادثات الخاصة */
        .main-app { width: 100%; height: 100vh; display: none; grid-template-columns: 350px 1fr; background: white; }
        .sidebar { border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .side-header { background: var(--dark); color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .contact-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
        .contact-item:hover { background: #f5f5f5; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; background: #eee; object-fit: cover; }

        .chat-view { background: #e5ddd5; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 10px 20px; background: #ededed; display: flex; align-items: center; gap: 15px; font-weight: bold; border-bottom: 1px solid #ddd; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .their-msg { align-self: flex-start; background: white; }

        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        .hidden { display: none !important; }

        @media (max-width: 768px) { .main-app { grid-template-columns: 1fr; } .mobile-hide { display: none; } }
    </style>
</head>
<body>

<div id="setup-screen" class="login-box">
    <div class="user-pic-upload" onclick="document.getElementById('file-in').click()">
        <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    </div>
    <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handlePic(this)">
    <h2>We App</h2>
    <input type="text" id="uname" placeholder="اسمك">
    <input type="tel" id="uphone" placeholder="رقم موبايلك">
    <button onclick="entry()">دخول</button>
</div>

<div id="app-screen" class="main-app">
    <div class="sidebar">
        <div class="side-header">
            <img id="my-p" style="width: 35px; height: 35px; border-radius: 50%;">
            <span>We App</span>
        </div>
        <div id="contacts-list" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <div id="chat-window" class="chat-view mobile-hide">
        <div id="chat-top" class="chat-header">
            <img id="target-p" style="width: 35px; height: 35px; border-radius: 50%;">
            <span id="target-n">اختر صديقاً</span>
        </div>
        <div id="msgs" class="messages-area"></div>
        <div class="input-area">
            <input type="text" id="minput" placeholder="اكتب رسالة..." style="margin:0; text-align: right;">
            <button onclick="sendMsg()" style="width: 60px; margin:0;">إرسال</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://weapp-80-default-rtdb.firebaseio.com",
        projectId: "weapp-80"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('user_data')) || null;
    let target = null;
    let myPicBase64 = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    if (me) launch();

    function handlePic(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview').src = e.target.result;
                myPicBase64 = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function entry() {
        const name = document.getElementById('uname').value.trim();
        const phone = document.getElementById('uphone').value.trim();
        if (!name || !phone) return alert("أكمل البيانات");

        me = { name, phone, pic: myPicBase64 };
        await db.ref('users/' + phone).set(me);
        localStorage.setItem('user_data', JSON.stringify(me));
        launch();
    }

    function launch() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('app-screen').style.display = 'grid';
        document.getElementById('my-p').src = me.pic;
        syncUsers();
    }

    function syncUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                if (u.phone !== me.phone) {
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.innerHTML = `<img src="${u.pic}"> <div><b>${u.name}</b><br><small>${u.phone}</small></div>`;
                    item.onclick = () => openChat(u);
                    list.appendChild(item);
                }
            });
        });
    }

    function openChat(u) {
        target = u;
        document.getElementById('chat-window').classList.remove('mobile-hide');
        document.getElementById('target-p').src = u.pic;
        document.getElementById('target-n').innerText = u.name;
        syncMsgs();
    }

    function syncMsgs() {
        if (!target) return;
        // الربط المباشر بين الرقمين
        const chatID = [me.phone, target.phone].sort().join('_');
        db.ref('direct_messages/' + chatID).on('value', snap => {
            const area = document.getElementById('msgs');
            area.innerHTML = '';
            snap.forEach(mSnap => {
                const m = mSnap.val();
                const isMe = m.from === me.phone;
                area.innerHTML += `<div class="bubble ${isMe ? 'my-msg' : 'their-msg'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const input = document.getElementById('minput');
        if (!input.value.trim() || !target) return;
        const chatID = [me.phone, target.phone].sort().join('_');
        db.ref('direct_messages/' + chatID).push({
            from: me.phone,
            txt: input.value,
            time: Date.now()
        });
        input.value = '';
    }
</script>
</body>
</html>
