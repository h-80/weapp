<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>عراق جات - Alfaham Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --wa-green: #25d366;
            --wa-dark: #075e54;
            --wa-bg: #efeae2;
            --bubble-me: #dcf8c6;
            --bubble-other: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* شاشة الدخول */
        .login-screen { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .main-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--wa-green); padding: 5px; margin-bottom: 20px; }

        /* الهيكل الرئيسي */
        .app-shell { width: min(100%, 1280px); height: 95vh; background: #fff; display: none; grid-template-columns: 380px 1fr; overflow: hidden; box-shadow: 0 2px 20px rgba(0,0,0,0.1); border-radius: 10px; }
        .active-app { display: grid; }

        /* القائمة الجانبية */
        .sidebar { border-left: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; background: white; }
        .sidebar-header { padding: 12px 16px; background: #ededed; display: flex; justify-content: space-between; align-items: center; }
        .brand-box { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--wa-dark); }
        .small-logo { width: 35px; height: 35px; border-radius: 50%; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-card { display: flex; align-items: center; gap: 12px; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f2f2f2; transition: 0.2s; }
        .chat-card:hover { background: #f5f6f6; }
        .chat-card img { width: 48px; height: 48px; border-radius: 50%; }

        /* منطقة الدردشة */
        .chat-main { display: flex; flex-direction: column; background: var(--wa-bg); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-topbar { background: #ededed; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--bubble-me); align-self: flex-end; border-top-left-radius: 8px; }
        .received { background: var(--bubble-other); align-self: flex-start; border-top-right-radius: 8px; }
        .time { font-size: 10px; color: #667781; display: block; text-align: left; margin-top: 4px; }

        .chat-footer { background: #f0f2f5; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
        .input-box { flex: 1; background: white; border-radius: 8px; padding: 10px 15px; border: none; outline: none; font-size: 15px; }
        .send-btn { background: none; border: none; cursor: pointer; color: #54656f; font-size: 24px; }

        @media (max-width: 768px) { .app-shell { grid-template-columns: 1fr; height: 100vh; border-radius: 0; } .hidden-mobile { display: none !important; } }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <img src="https://e.top4top.io/p_3771yr28m3.png" class="main-logo">
    <h2 style="color: var(--wa-dark);">عراق جات</h2>
    <p style="color: #66707d; margin-bottom: 25px;">بواسطة هايدر الفاهم</p>
    <button onclick="login()" style="width:100%; padding:12px; border-radius:25px; border:1px solid #ccc; background:white; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
        الدخول عبر جوجل
    </button>
</div>

<div id="app-shell" class="app-shell">
    <section id="side-panel" class="sidebar">
        <div class="sidebar-header">
            <div class="brand-box">
                <img src="https://e.top4top.io/p_3771yr28m3.png" class="small-logo">
                <span>الفاهم جات</span>
            </div>
            <img id="my-avatar" style="width: 35px; height:35px; border-radius:50%;">
        </div>
        <div class="chat-list" id="users-list"></div>
    </section>

    <section id="chat-panel" class="chat-main hidden-mobile">
        <div class="chat-topbar">
            <img id="target-avatar" style="width:40px; height:40px; border-radius:50%;">
            <div style="flex:1">
                <div id="target-name" style="font-weight:600;">اختر صديقاً</div>
                <div style="font-size:12px; color:#667781;">متصل الآن</div>
            </div>
        </div>
        <div class="messages-container" id="messages-area"></div>
        <div class="chat-footer">
            <input type="text" id="msg-input" class="input-box" placeholder="اكتب رسالة...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtwuFrMZr3ZI3yVAL9hFqJNRlHUPB0EWM",
        authDomain: "weapp-80.firebaseapp.com",
        databaseURL: "https://weapp-80-default-rtdb.firebaseio.com",
        projectId: "weapp-80",
        storageBucket: "weapp-80.firebasestorage.app",
        appId: "1:951505296041:web:ad9404236b969b61e9e7b8"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    let me = null;
    let target = null;

    function login() { auth.signInWithRedirect(provider); }

    auth.getRedirectResult().then(res => {
        if (res.user || auth.currentUser) {
            me = res.user || auth.currentUser;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-shell').classList.add('active-app');
            document.getElementById('my-avatar').src = me.photoURL;
            db.ref('users/' + me.uid).set({ uid: me.uid, name: me.displayName, img: me.photoURL });
            loadUsers();
        }
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                if (u.uid !== me.uid) {
                    const d = document.createElement('div');
                    d.className = 'chat-card';
                    d.innerHTML = `<img src="${u.img}"><div><b>${u.name}</b></div>`;
                    d.onclick = () => {
                        target = u;
                        document.getElementById('target-name').innerText = u.name;
                        document.getElementById('target-avatar').src = u.img;
                        document.getElementById('chat-panel').classList.remove('hidden-mobile');
                        loadMsgs();
                    };
                    list.appendChild(d);
                }
            });
        });
    }

    function loadMsgs() {
        const id = [me.uid, target.uid].sort().join('_');
        db.ref('chats/' + id).on('value', snap => {
            const area = document.getElementById('messages-area');
            area.innerHTML = '';
            snap.forEach(mSnap => {
                const m = mSnap.val();
                const div = document.createElement('div');
                div.className = `message ${m.sender === me.uid ? 'sent' : 'received'}`;
                div.innerHTML = `${m.text} <span class="time">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !target) return;
        const id = [me.uid, target.uid].sort().join('_');
        db.ref('chats/' + id).push({ sender: me.uid, text: input.value, time: Date.now() });
        input.value = '';
    }
</script>
</body>
</html>
