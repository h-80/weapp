<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>عراق جات - الفاهم</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --wa-green: #25d366; --wa-dark: #075e54; --wa-bg: #efeae2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .reg-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .hidden { display: none !important; }
        
        .pic-box { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; cursor: pointer; }
        .pic-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--wa-green); }
        .pic-box .label { position: absolute; bottom: 0; right: 5px; background: var(--wa-green); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 18px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; background: var(--wa-green); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #999; }
        
        .app-shell { width: 100%; height: 100vh; background: white; display: none; grid-template-columns: 350px 1fr; }
        .sidebar { border-left: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .chat-main { background: var(--wa-bg); display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        @media (max-width: 768px) { .app-shell { grid-template-columns: 1fr; } .mobile-hide { display: none; } }
    </style>
</head>
<body>

<div id="register-screen" class="reg-card">
    <div class="pic-box" onclick="document.getElementById('file-input').click()">
        <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <div class="label">📷</div>
    </div>
    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImg(this)">
    
    <h3>مرحباً بك في عراق جات</h3>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="tel" id="userphone" placeholder="رقم الموبايل (سيكون هوية حسابك)">
    
    <button id="login-btn" onclick="startApp()">دخول للتطبيق</button>
</div>

<div id="app-shell" class="app-shell">
    <div class="sidebar">
        <div style="padding: 15px; background: var(--wa-dark); color: white; display: flex; align-items: center; justify-content: space-between;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="my-avatar" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; background: white;">
                <span id="my-name-display" style="font-weight:bold;">الفاهم</span>
            </div>
            <button onclick="logout()" style="width:auto; padding:5px 10px; font-size:11px; background:#ff5252; margin:0;">خروج</button>
        </div>
        <div id="users-list" style="overflow-y: auto; flex: 1;"></div>
    </div>
    
    <div class="chat-main mobile-hide" id="chat-panel">
        <div id="chat-header" style="padding: 15px; background: #ededed; border-bottom: 1px solid #ddd; font-weight: bold;"></div>
        <div id="msg-box" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px;"></div>
        <div style="padding: 10px; background: #f0f2f5; display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="margin: 0; background: white;">
            <button onclick="send()" style="width: 50px; margin:0; padding:10px;">➤</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        databaseURL: "https://weapp-80-default-rtdb.firebaseio.com",
        projectId: "weapp-80"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myInfo = JSON.parse(localStorage.getItem('alfaham_user')) || null;
    let targetUser = null;
    let base64Image = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    if (myInfo) showApp();

    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-img').src = e.target.result;
                base64Image = e.target.result; // حفظ الصورة كنص
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function startApp() {
        const name = document.getElementById('username').value.trim();
        const phone = document.getElementById('userphone').value.trim();
        
        if (!name || !phone) return alert("يرجى ملء جميع الحقول");

        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.innerText = "جاري الدخول...";

        myInfo = { name, phone, img: base64Image };

        try {
            // محاولة الحفظ في السيرفر مع مهلة زمنية قصيرة
            await db.ref('users/' + phone).set(myInfo);
            localStorage.setItem('alfaham_user', JSON.stringify(myInfo));
            showApp();
        } catch (e) {
            // إذا فشل السيرفر، يدخل التطبيق محلياً للاختبار
            console.log("Offline mode");
            localStorage.setItem('alfaham_user', JSON.stringify(myInfo));
            showApp();
        }
    }

    function showApp() {
        document.getElementById('register-screen').classList.add('hidden');
        document.getElementById('app-shell').style.display = 'grid';
        document.getElementById('my-avatar').src = myInfo.img;
        document.getElementById('my-name-display').innerText = myInfo.name;
        loadUsers();
    }

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                if (u.phone !== myInfo.phone) {
                    const d = document.createElement('div');
                    d.style = "padding: 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; align-items: center; gap: 12px;";
                    d.innerHTML = `<img src="${u.img}" style="width:45px; height:45px; border-radius:50%; object-fit:cover; background:#eee;"> <b>${u.name}</b>`;
                    d.onclick = () => {
                        targetUser = u;
                        document.getElementById('chat-panel').classList.remove('mobile-hide');
                        document.getElementById('chat-header').innerText = u.name;
                        loadMsgs();
                    };
                    list.appendChild(d);
                }
            });
        });
    }

    function loadMsgs() {
        if(!targetUser) return;
        const chatID = [myInfo.phone, targetUser.phone].sort().join('_');
        db.ref('chats/' + chatID).on('value', snap => {
            const box = document.getElementById('msg-box');
            box.innerHTML = '';
            snap.forEach(mSnap => {
                const m = mSnap.val();
                const isMe = m.sender === myInfo.phone;
                const div = document.createElement('div');
                div.style = `align-self: ${isMe ? 'flex-end' : 'flex-start'}; background: ${isMe ? '#dcf8c6' : '#fff'}; padding: 8px 12px; border-radius: 10px; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size:14px;`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !targetUser) return;
        const chatID = [myInfo.phone, targetUser.phone].sort().join('_');
        db.ref('chats/' + chatID).push({ sender: myInfo.phone, text: input.value, time: Date.now() });
        input.value = '';
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
