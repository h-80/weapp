<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>We App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --wa-green: #25d366; 
            --bg: #f0f2f5; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; }

        /* شاشة الدخول المعدلة */
        #login-screen { 
            position: fixed; inset: 0; 
            background: var(--wa-green); 
            z-index: 6000; 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
            color: white;
        }
        .login-main-logo { width: 180px; max-width: 80%; margin-bottom: 30px; } /* حجم متناسق */
        
        #login-screen input { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; 
            text-align: center; font-size: 16px; background: rgba(255, 255, 255, 0.9);
        }
        
        .btn-login-action { 
            width: 100%; padding: 15px; background: white; color: var(--wa-green); 
            border: none; border-radius: 12px; font-weight: bold; font-size: 18px; 
            cursor: pointer; margin-top: 10px;
        }

        /* الهيدر */
        header { 
            background: var(--wa-green); 
            color: white; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; height: 85px; box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-logo-img { height: 65px; width: auto; object-fit: contain; }
        .app-name { font-weight: 900; font-size: 26px; }
        .h-avatar { width: 55px; height: 55px; border-radius: 50%; border: 3px solid white; cursor: pointer; object-fit: cover; }

        .screen { height: calc(100vh - 85px); overflow-y: auto; background: white; position: relative; }
        .user-row { padding: 18px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .user-row img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        
        .fab { position: fixed; bottom: 30px; left: 30px; background: var(--wa-green); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); cursor: pointer; }

        /* مودال الملف الشخصي */
        .profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .profile-card { background: white; width: 90%; max-width: 380px; padding: 40px 25px; border-radius: 30px; text-align: center; position: relative; }
        .edit-pic-wrapper { width: 130px; height: 130px; margin: 0 auto 25px; cursor: pointer; position: relative; }
        .edit-pic-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--wa-green); }
        
        .btn-save-profile { width: 100%; padding: 15px; background: var(--wa-green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-out { width: 100%; padding: 12px; background: #ff3b3b; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .chat-full { position: fixed; inset: 0; background: #e5ddd5; z-index: 2000; display: none; flex-direction: column; }
        .chat-header { background: #ededed; padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ddd; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 10px; max-width: 80%; font-size: 15px; }
        .me { align-self: flex-end; background: #dcf8c6; }
        .them { align-self: flex-start; background: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen" class="hidden">
    <div style="text-align: center; width: 100%; max-width: 400px;">
        <img src="https://a.top4top.io/p_3772g2v8s0.png" class="login-main-logo">
        
        <div class="edit-pic-wrapper" onclick="document.getElementById('f-reg').click()">
            <img id="reg-pre" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div style="position:absolute; bottom:5px; right:5px; background:white; border-radius:50%; width:30px; height:30px; color:var(--wa-green); display:flex; align-items:center; justify-content:center; font-size:18px;">+</div>
        </div>
        
        <input type="file" id="f-reg" class="hidden" accept="image/*" onchange="compress(this, 'reg-pre')">
        <input type="text" id="n-reg" placeholder="الاسم المستعار">
        <input type="tel" id="p-reg" placeholder="رقم الهاتف">
        <button class="btn-login-action" onclick="register()">انضم الآن</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div class="header-brand">
            <img src="https://d.top4top.io/p_37720paiy0.png" class="header-logo-img">
            <span class="app-name">We App</span>
        </div>
        <img id="header-img" class="h-avatar" onclick="toggleProfile(true)">
    </header>

    <div id="main-screen" class="screen">
        <div id="recent-list"></div>
        <div class="fab" onclick="showContacts()">+</div>
    </div>

    <div id="contacts-screen" class="screen hidden">
        <div style="padding:20px; background:#f9f9f9; border-bottom:1px solid #eee; cursor:pointer; font-weight:bold;" onclick="hideContacts()">⬅ العودة</div>
        <div id="all-list"></div>
    </div>
</div>

<div id="profile-modal" class="profile-modal">
    <div class="profile-card">
        <span style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:35px; color:#888;" onclick="toggleProfile(false)">&times;</span>
        <h2 style="margin-bottom:25px;">الملف الشخصي</h2>
        <div class="edit-pic-wrapper" onclick="document.getElementById('f-edit').click()">
            <img id="edit-pre" src="">
        </div>
        <input type="file" id="f-edit" class="hidden" accept="image/*" onchange="compress(this, 'edit-pre')">
        <input type="text" id="edit-name-input" placeholder="تعديل الاسم">
        <button class="btn-save-profile" onclick="updateProfile()">حفظ</button>
        <button class="btn-out" onclick="logout()">خروج</button>
    </div>
</div>

<div id="chat-ui" class="chat-full">
    <div class="chat-header">
        <span onclick="closeChat()" style="cursor:pointer; font-size:30px; padding:0 10px;">⬅</span>
        <img id="c-avatar" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
        <b id="c-name"></b>
    </div>
    <div id="c-msgs" class="msgs"></div>
    <div style="padding:15px; background:#f0f2f5; display:flex; gap:12px;">
        <input type="text" id="c-input" placeholder="اكتب رسالة..." style="margin:0; flex:1; border-radius:12px; border:1px solid #ddd; padding:12px;">
        <button onclick="sendMsg()" style="padding:0 20px; background:var(--wa-green); border:none; color:white; border-radius:12px; font-weight:bold;">إرسال</button>
    </div>
</div>

<script>
    const fb = firebase.initializeApp({ databaseURL: "https://weapp-80-default-rtdb.firebaseio.com" });
    const db = fb.database();

    let my = JSON.parse(localStorage.getItem('we_user_v2')) || null;
    let peer = null;
    let tempImg = "";

    window.onload = () => {
        if(!my) document.getElementById('login-screen').classList.remove('hidden');
        else init();
    };

    function compress(input, targetId) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = 150; cvs.height = 150;
                    cvs.getContext('2d').drawImage(img, 0, 0, 150, 150);
                    tempImg = cvs.toDataURL('image/jpeg', 0.7);
                    document.getElementById(targetId).src = tempImg;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    async function register() {
        const n = document.getElementById('n-reg').value.trim();
        const p = document.getElementById('p-reg').value.trim();
        if(!n || !p) return alert("أكمل البيانات");
        my = { name: n, phone: p, img: tempImg || "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
        await db.ref('users/' + p).set(my);
        localStorage.setItem('we_user_v2', JSON.stringify(my));
        location.reload();
    }

    function init() {
        document.getElementById('header-img').src = my.img;
        loadRecents();
    }

    function toggleProfile(show) {
        const modal = document.getElementById('profile-modal');
        if(show) {
            modal.style.display = 'flex';
            document.getElementById('edit-pre').src = my.img;
            document.getElementById('edit-name-input').value = my.name;
            tempImg = my.img;
        } else { modal.style.display = 'none'; }
    }

    async function updateProfile() {
        my.name = document.getElementById('edit-name-input').value.trim();
        my.img = tempImg;
        await db.ref('users/' + my.phone).update({ name: my.name, img: my.img });
        localStorage.setItem('we_user_v2', JSON.stringify(my));
        document.getElementById('header-img').src = my.img;
        toggleProfile(false);
    }

    function logout() {
        if(confirm("خروج؟")) { localStorage.clear(); location.reload(); }
    }

    function loadRecents() {
        db.ref('chats').on('value', s => {
            const l = document.getElementById('recent-list'); l.innerHTML = '';
            s.forEach(child => {
                if(child.key.includes(my.phone)) {
                    const pNum = child.key.replace(my.phone,'').replace('_','');
                    db.ref('users/'+pNum).once('value', uS => {
                        const u = uS.val();
                        if(u) {
                            const last = Object.values(child.val()).pop();
                            l.innerHTML += `<div class="user-row" onclick='openChat(${JSON.stringify(u)})'><img src="${u.img}"> <div><b>${u.name}</b><br><small style="color:#888">${last.t}</small></div></div>`;
                        }
                    });
                }
            });
        });
    }

    function showContacts() {
        document.getElementById('contacts-screen').classList.remove('hidden');
        db.ref('users').once('value', s => {
            const l = document.getElementById('all-list'); l.innerHTML = '';
            s.forEach(c => {
                const u = c.val();
                if(u.phone !== my.phone) {
                    l.innerHTML += `<div class="user-row" onclick='hideContacts(); openChat(${JSON.stringify(u)})'><img src="${u.img}"> <b>${u.name}</b></div>`;
                }
            });
        });
    }

    function hideContacts() { document.getElementById('contacts-screen').classList.add('hidden'); }

    function openChat(u) {
        peer = u;
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('c-avatar').src = u.img;
        document.getElementById('c-name').innerText = u.name;
        const id = [my.phone, peer.phone].sort().join('_');
        db.ref('chats/' + id).on('value', s => {
            const a = document.getElementById('c-msgs'); a.innerHTML = '';
            s.forEach(mS => {
                const m = mS.val();
                a.innerHTML += `<div class="bubble ${m.u===my.phone?'me':'them'}">${m.t}</div>`;
            });
            a.scrollTop = a.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('c-input');
        if(!i.value.trim()) return;
        const id = [my.phone, peer.phone].sort().join('_');
        db.ref('chats/' + id).push({ u: my.phone, t: i.value });
        i.value = '';
    }

    function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }
</script>
</body>
</html>
