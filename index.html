<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>We App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --app-theme: #25d366; --bg: #eef3f8; --surface: #ffffff; --surface-soft: #f8fbff; --red: #ff4b4b; --text: #111827; --muted: #6b7280; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }
        body { min-height: 100vh; background: radial-gradient(circle at top left, rgba(37, 211, 102, 0.16), transparent 18%), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%); color: var(--text); overflow: hidden; }
        button { font-family: inherit; }

        header {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.95), rgba(16, 185, 129, 0.95));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            height: 100px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            position: relative;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: center;
        }
        .header-logo-img { width: 54px; height: 54px; border-radius: 50%; background: transparent; object-fit: cover; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }
        .h-avatar { width: 54px; height: 54px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.9); cursor: pointer; object-fit: cover; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15); position: absolute; left: 20px; top: 50%; transform: translateY(-50%); }
        .brand-info { display: grid; gap: 4px; }
        .app-name { font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; font-weight: 900; font-size: 28px; letter-spacing: -0.05em; }
        .app-tagline { display: none; }

        .screen { height: calc(100vh - 100px); overflow-y: auto; background: var(--surface-soft); padding: 24px 20px 140px; }
        .screen::before {
            content: '';
            position: fixed;
            top: 110px;
            left: 0;
            right: 0;
            height: 120px;
            background: radial-gradient(circle, rgba(37,211,102,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .user-row { background: #ffffff; border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 16px; transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04); margin-bottom: 14px; }
        .user-row:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.09); }
        .user-info { flex: 1; cursor: pointer; display: flex; align-items: center; gap: 14px; overflow: hidden; }
        .user-row img { width: 60px; height: 60px; border-radius: 18px; object-fit: cover; border: 1px solid var(--border); }
        .user-info b { font-size: 16px; }
        .user-info small { color: var(--muted); }
        .delete-btn {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 75, 75, 0.12);
            color: var(--red);
            font-size: 18px;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
            opacity: 0.88;
        }
        .delete-btn:hover {
            background: rgba(255, 75, 75, 0.22);
            transform: translateY(-1px);
            opacity: 1;
        }

        #custom-confirm {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); z-index: 9999;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .confirm-box { background: white; width: 90%; max-width: 340px; padding: 26px; border-radius: 26px; text-align: center; animation: pop 0.25s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .confirm-btns { display: flex; gap: 10px; margin-top: 24px; }
        .confirm-btns button { flex: 1; padding: 12px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }

        #contacts-screen { position: fixed; inset: 0; background: var(--surface-soft); z-index: 3000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #contacts-screen.show { transform: translateY(0); }
        .contact-form { padding: 24px; background: var(--surface); border-radius: 28px; border: 1px solid rgba(16, 185, 129, 0.16); box-shadow: 0 16px 40px rgba(37, 211, 102, 0.08); margin: 0 20px 18px; }
        .contact-form input { width: 100%; padding: 16px 18px; border-radius: 20px; border: 1px solid var(--border); outline: none; font-size: 15px; margin-bottom: 14px; background: #fff; }
        .btn-add { width: 100%; padding: 16px; background: var(--app-theme); color: white; border: none; border-radius: 24px; font-weight: 800; cursor: pointer; font-size: 15px; box-shadow: 0 16px 40px rgba(37, 211, 102, 0.24); transition: transform 0.18s ease, filter 0.18s ease; }
        .btn-add:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .contacts-header { padding: 22px 24px 12px; display: flex; flex-direction: column; gap: 6px; }
        .contacts-header .section-title { font-size: 20px; font-weight: 900; margin-bottom: 0; }
        .contacts-header .section-subtitle { font-size: 14px; color: var(--muted); margin: 0; }
        .contacts-summary { margin: 0 20px 16px; color: var(--muted); font-size: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .contacts-summary b { color: var(--text); }
        #my-contacts-list { overflow-y: auto; height: calc(100vh - 380px); padding: 0 20px 20px; }
        .contacts-screen .user-row { background: #ffffff; border: 1px solid var(--border); border-radius: 22px; padding: 16px 16px 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 16px 30px rgba(15, 23, 42, 0.06); margin-bottom: 12px; }
        .contacts-screen .user-info { gap: 12px; }
        .contacts-screen .user-row img { width: 56px; height: 56px; border-radius: 18px; border: 1px solid var(--border); }
        .contacts-screen .user-info b { font-size: 16px; }
        .contacts-screen .user-info small { color: var(--muted); }
        .contacts-screen .delete-btn { width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255, 75, 75, 0.12); color: var(--red); font-size: 18px; border-radius: 16px; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease; opacity: 0.96; }
        .contacts-screen .delete-btn:hover { background: rgba(255, 75, 75, 0.22); transform: translateY(-1px); opacity: 1; }
        .contacts-screen .no-contacts { text-align: center; color: #8c98a8; font-size: 14px; padding: 40px 0; }
        .contacts-header .section-subtitle { font-size: 13px; color: var(--muted); }

        .chat-full {
            position: fixed;
            inset: 0;
            background-color: #e5ddd5;
            background-image:
                radial-gradient(circle at 60px 60px, rgba(255, 255, 255, 0.12) 0, transparent 12px),
                radial-gradient(circle at 190px 30px, rgba(255, 255, 255, 0.12) 0, transparent 14px),
                radial-gradient(circle at 140px 180px, rgba(255, 255, 255, 0.08) 0, transparent 10px),
                radial-gradient(circle at 260px 250px, rgba(255, 255, 255, 0.1) 0, transparent 12px);
            background-size: 100px 100px, 120px 120px, 80px 80px, 100px 100px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: rgba(255, 255, 255, 0.98);
            padding: 14px 18px;
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            height: 84px;
            position: sticky;
            top: 0;
            z-index: 2;
            direction: rtl;
        }
        .chat-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: rgba(16, 185, 129, 0.12);
            color: var(--app-theme);
            font-size: 18px;
            cursor: pointer;
        }
        .chat-actions button:hover {
            background: rgba(16, 185, 129, 0.2);
        }
        .chat-info {
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .chat-header img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid rgba(15, 23, 42, 0.08);
            object-fit: cover;
        }
        .chat-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .chat-title b {
            font-size: 17px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: rtl;
        }
        .chat-status {
            font-size: 13px;
            color: #4f6a5a;
        }
        .emoji-panel {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 118px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 22px;
            padding: 12px 14px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
            z-index: 3;
        }
        .emoji-panel button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f7faf8;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }
        .msgs {
            flex: 1;
            padding: 22px 18px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: transparent;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 76%;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
            box-shadow: none;
        }
        .me {
            align-self: flex-start;
            background: #dcf8c6;
            color: #111;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 18px;
        }
        .me::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -6px;
            width: 12px;
            height: 16px;
            background: #dcf8c6;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            transform: translateY(-1px);
        }
        .them {
            align-self: flex-end;
            background: #ffffff;
            color: #111827;
            border-top-right-radius: 18px;
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        .them::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -6px;
            width: 12px;
            height: 16px;
            background: #ffffff;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            transform: translateY(-1px);
        }
        .bubble-time {
            display: block;
            margin-top: 8px;
            font-size: 11px;
            color: #6b7280;
            text-align: right;
        }
        .me .bubble-time {
            color: #4f6a5a;
            font-weight: 600;
        }
        .me .bubble-time.read {
            color: #34b7f1;
            font-weight: 700;
        }
        .chat-input-area {
            padding: 10px 12px;
            background: transparent;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            position: sticky;
            bottom: 0;
            z-index: 1;
        }
        .mic-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            background: var(--app-theme);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(37, 211, 102, 0.22);
            cursor: pointer;
        }
        .chat-input-pill {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 999px;
            background: white;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .chat-input-pill .camera-btn,
        .chat-input-pill .attach-btn,
        .chat-input-pill .emoji-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(16, 185, 129, 0.08);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .mic-btn.recording {
            background: #ef4444;
            color: white;
        }
        .chat-input-pill .camera-btn:hover,
        .chat-input-pill .attach-btn:hover,
        .chat-input-pill .emoji-btn:hover {
            background: rgba(16, 185, 129, 0.16);
        }
        .chat-input-pill input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background: transparent;
            padding: 0 4px;
            color: var(--text);
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--app-theme);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 22px rgba(37, 211, 102, 0.24);
        }
        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .fab { position: fixed; bottom: 30px; left: 30px; background: var(--app-theme); color: white; width: 66px; height: 66px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 34px; box-shadow: 0 20px 40px rgba(37, 211, 102, 0.28); cursor: pointer; z-index: 100; transition: transform 0.2s ease, background 0.2s ease; }
        .fab:hover { transform: translateY(-2px); background: #1eb75a; }

        .unread-pill {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #25d366;
            margin-left: 12px;
            margin-right: 0;
            align-self: center;
        }

        #profile-screen {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); display: none; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(3px);
        }
        .profile-box { width: 92%; max-width: 420px; background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18); animation: pop 0.25s ease; }
        .profile-top { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; border-bottom: 1px solid var(--border); }
        .profile-top h3 { margin: 0; font-size: 20px; }
        .profile-close { cursor: pointer; font-size: 28px; line-height: 1; color: var(--muted); }
        .profile-body { padding: 24px; display: grid; gap: 18px; }
        .profile-avatar { display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .profile-avatar img { width: 132px; height: 132px; border-radius: 24px; object-fit: cover; border: 4px solid #f0f7ee; }
        .profile-field label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 14px; }
        .profile-field input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--border); outline: none; font-size: 15px; }
        .profile-actions { display: grid; gap: 12px; }
        .profile-actions button { width: 100%; padding: 14px; border: none; border-radius: 16px; cursor: pointer; font-weight: bold; }
        .profile-actions .btn-secondary { background: #f5f5f5; color: var(--text); }
        .profile-actions .btn-logout { background: var(--red); color: white; }
        .profile-actions .btn-add { background: var(--app-theme); color: white; }

        #login-screen {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at top left, rgba(37, 211, 102, 0.18), transparent 20%), radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 20%), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
            z-index: 6000;
        }
        .login-card {
            width: min(420px, calc(100% - 40px));
            background: rgba(255,255,255,0.98);
            border-radius: 34px;
            padding: 28px 24px 30px;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.16);
            text-align: center;
            border: 1px solid rgba(37, 211, 102, 0.12);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(37, 211, 102, 0.12), transparent 22%), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.12), transparent 22%);
            pointer-events: none;
        }
        .login-logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-card h2 {
            margin: 0 0 20px;
            font-size: 28px;
            color: var(--text);
        }
        .login-card input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(16, 185, 129, 0.22);
            outline: none;
            font-size: 15px;
            margin-bottom: 18px;
            background: rgba(255,255,255,0.96);
            box-shadow: inset 0 1px 4px rgba(15, 23, 42, 0.06);
        }
        .login-card button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            background: var(--app-theme);
            color: white;
            font-size: 16px;
            box-shadow: 0 14px 34px rgba(37, 211, 102, 0.24);
            transition: transform 0.18s ease, filter 0.18s ease;
        }
        .login-card button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }
    </style>
</head>
<body>

<div id="custom-confirm">
    <div class="confirm-box">
        <h3 id="confirm-msg"></h3>
        <p id="confirm-submsg" style="font-size: 14px; color: #666; margin-top: 5px;"></p>
        <div class="confirm-btns">
            <button id="confirm-yes-btn">تأكيد</button>
            <button id="confirm-no-btn">إلغاء</button>
        </div>
    </div>
</div>

<div id="profile-screen">
    <div class="profile-box">
        <div class="profile-top">
            <h3>الملف الشخصي</h3>
            <span class="profile-close" onclick="closeProfile()">×</span>
        </div>
        <div class="profile-body">
            <div class="profile-avatar">
                <img id="profile-img-preview" src="" alt="صورة الملف الشخصي">
                <button type="button" class="btn-secondary" onclick="triggerProfileImage()">تعديل الصورة</button>
                <input id="profile-file-input" type="file" accept="image/*" style="display:none" onchange="handleProfileFile(event)">
            </div>
            <div class="profile-field">
                <label for="profile-name-input">الاسم</label>
                <input id="profile-name-input" type="text" readonly>
            </div>
            <div class="profile-actions">
                <button type="button" class="btn-secondary" onclick="editProfileName()">تعديل الاسم</button>
                <button type="button" class="btn-add" onclick="saveProfile()">حفظ التغييرات</button>
                <button type="button" class="btn-secondary" onclick="closeProfile()">إغلاق</button>
                <button type="button" class="btn-logout" onclick="logoutRequest()">تسجيل خروج</button>
            </div>
        </div>
    </div>
</div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <img src="https://c.top4top.io/p_3771lv9ra1.png" alt="شعار We App">
        </div>
        <h2>We App</h2>
        <input id="login-phone" type="tel" placeholder="رقم الهاتف">
        <button onclick="login()">تسجيل الدخول</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div class="brand">
            <div class="brand-info">
                <span class="app-name">We App</span>
            </div>
        </div>
        <img src="https://c.top4top.io/p_3771lv9ra1.png" class="header-logo-img" alt="شعار We App">
        <img id="header-img" class="h-avatar" src="https://c.top4top.io/p_3771lv9ra1.png" onclick="showProfile()" alt="صورة الملف الشخصي">
    </header>

    <div id="main-screen" class="screen">
        <div id="recent-list"></div>
        <div class="fab" onclick="toggleContacts(true)">+</div>
    </div>
</div>

<div id="contacts-screen">
    <header class="contacts-header">
        <div>
            <p class="section-title">إضافة جهات اتصال</p>
            <p class="section-subtitle">أدخل الرقم واختر اسماً خاصاً ليظهر في قائمتك.</p>
        </div>
    </header>
    
    <div class="contact-form">
        <input type="text" id="nc-name" placeholder="اسم جهة اتصال جديدة">
        <input type="tel" id="nc-phone" placeholder="رقم الهاتف">
        <button onclick="addNewContact()" class="btn-add">تزامن وإضافة</button>
    </div>

    <div class="contacts-summary">
        <span>قائمة جهات الاتصال المحفوظة</span>
        <b id="contacts-count">0</b>
    </div>
    <div id="my-contacts-list"></div>
</div>

<div id="chat-ui" class="chat-full">
    <div class="chat-header">
        <div class="chat-info">
            <div class="chat-title">
                <b id="c-name"></b>
                <span id="chat-status" class="chat-status">آخر ظهور اليوم الساعة 4:43 م</span>
            </div>
            <img id="c-avatar" src="" alt="صورة جهة الاتصال">
        </div>
    </div>
    <div id="c-msgs" class="msgs"></div>
    <div id="emoji-panel" class="emoji-panel">
        <button type="button" onclick="insertEmoji('😊')">😊</button>
        <button type="button" onclick="insertEmoji('😂')">😂</button>
        <button type="button" onclick="insertEmoji('👍')">👍</button>
        <button type="button" onclick="insertEmoji('❤️')">❤️</button>
        <button type="button" onclick="insertEmoji('😍')">😍</button>
        <button type="button" onclick="insertEmoji('😅')">😅</button>
        <button type="button" onclick="insertEmoji('🎉')">🎉</button>
        <button type="button" onclick="insertEmoji('😎')">😎</button>
    </div>
    <div class="chat-input-area">
        <div class="chat-input-pill">
            <button type="button" class="emoji-btn" onclick="toggleEmojiPanel()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22C6.48 22 2 17.52 2 12C2 6.48 6.48 2 12 2C17.52 2 22 6.48 22 12C22 17.52 17.52 22 12 22ZM8.5 10C9.33 10 10 9.33 10 8.5C10 7.67 9.33 7 8.5 7C7.67 7 7 7.67 7 8.5C7 9.33 7.67 10 8.5 10ZM15.5 10C16.33 10 17 9.33 17 8.5C17 7.67 16.33 7 15.5 7C14.67 7 14 7.67 14 8.5C14 9.33 14.67 10 15.5 10ZM8 15C8.83 16.33 10.33 17 12 17C13.67 17 15.17 16.33 16 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input type="text" id="c-input" placeholder="مراسلة" oninput="updateInputMode()" onkeydown="handleChatInputKeydown(event)">
            <button type="button" class="camera-btn" onclick="openAttachmentPopup()" title="إضافة صورة">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 5h-3.2l-1.8-2H8L6.2 5H3c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 12H3V7h3.8l1.8-2h4.4l1.8 2H21v10zm-8-9a4 4 0 100 8 4 4 0 000-8zm0 2a2 2 0 110 4 2 2 0 010-4z" fill="currentColor"/></svg>
            </button>
            <button type="button" id="send-btn" class="send-btn" onclick="sendMsg()" style="display:none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="currentColor"/></svg>
            </button>
        </div>
        <button type="button" id="voice-btn" class="mic-btn" onclick="startVoiceRecording()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14ZM19 11C19 14.31 16.31 17 13 17H11C7.69 17 5 14.31 5 11H3C3 15.42 6.58 19 11 19V22H13V19C17.42 19 21 15.42 21 11H19Z" fill="currentColor"/></svg>
        </button>
    </div>
</div>
<input id="chat-img-input" type="file" accept="image/*" style="display:none" onchange="handleChatImage(event)">

<script>
    const firebaseConfig = { databaseURL: "https://weapp-80-default-rtdb.firebaseio.com" };
    const fb = firebase.initializeApp(firebaseConfig);
    const db = fb.database();

    let my = JSON.parse(localStorage.getItem('we_user_v2')) || null;
    let deletedChats = JSON.parse(localStorage.getItem('deleted_chats')) || [];
    let chatSeenCounts = JSON.parse(localStorage.getItem('chat_seen_counts')) || {};
    let myFriends = JSON.parse(localStorage.getItem('my_friends_list')) || [];
    if (myFriends.length && typeof myFriends[0] === 'string') {
        myFriends = myFriends.map(phone => ({ phone, name: phone }));
        localStorage.setItem('my_friends_list', JSON.stringify(myFriends));
    }
    let peer = null;

    function saveChatSeenCounts() {
        localStorage.setItem('chat_seen_counts', JSON.stringify(chatSeenCounts));
    }

    function getChatSeenCount(id) {
        return chatSeenCounts[id] || 0;
    }

    function updateChatSeenCount(id, count) {
        chatSeenCounts[id] = count;
        saveChatSeenCounts();
    }

    function markChatMessagesAsRead(id) {
        db.ref('chats/' + id).once('value', s => {
            const updates = {};
            s.forEach(child => {
                const m = child.val();
                if (m.u !== my.phone && m.r !== true) {
                    updates[child.key + '/r'] = true;
                }
            });
            if (Object.keys(updates).length) {
                db.ref('chats/' + id).update(updates);
            }
        });
    }

    window.onload = () => {
        window.history.replaceState({ page: 'home' }, '', location.href);
        window.onpopstate = ev => handleBackState(ev.state);
        if (my && my.phone) {
            initApp();
        } else {
            showLogin();
        }
    };

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('header-img').src = my.img || 'https://b.top4top.io/p_3771kqoax0.png';
        loadRecentChats();
        loadMyContacts();
    }

    function showLogin() {
        document.getElementById('app-content').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        hideAllOverlays();
    }

    function login() {
        const phone = document.getElementById('login-phone').value.trim();
        if (!phone) {
            showConfirm('رقم مطلوب', 'يرجى إدخال رقم الهاتف للمتابعة.', true);
            return;
        }
        db.ref('users/' + phone).once('value', s => {
            if (s.exists()) {
                my = s.val();
                my.phone = phone;
                localStorage.setItem('we_user_v2', JSON.stringify(my));
                initApp();
            } else {
                showConfirm('غير موجود', 'هذا الرقم غير مسجل في التطبيق.', true);
            }
        });
    }

    function showConfirm(title, sub, isRed = true) {
        return new Promise(r => {
            const m = document.getElementById('custom-confirm');
            document.getElementById('confirm-msg').innerText = title;
            document.getElementById('confirm-submsg').innerText = sub;
            const yBtn = document.getElementById('confirm-yes-btn');
            yBtn.style.background = isRed ? 'var(--red)' : 'var(--app-theme)';
            yBtn.style.color = 'white';
            m.style.display = 'flex';
            yBtn.onclick = () => { m.style.display='none'; r(true); };
            document.getElementById('confirm-no-btn').onclick = () => { m.style.display='none'; r(false); };
        });
    }

    function handleBackState(state) {
        const page = (state && state.page) || 'home';
        if (page === 'contacts') {
            showOnlyContacts();
        } else if (page === 'chat') {
            if (peer) {
                document.getElementById('chat-ui').style.display = 'flex';
            } else {
                hideAllOverlays();
            }
        } else if (page === 'profile') {
            showOnlyProfile();
        } else {
            hideAllOverlays();
        }
    }

    function hideAllOverlays() {
        document.getElementById('contacts-screen').classList.remove('show');
        document.getElementById('chat-ui').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'none';
    }

    function showOnlyContacts() {
        hideAllOverlays();
        document.getElementById('contacts-screen').classList.add('show');
    }

    function toggleContacts(show) {
        if (show) {
            window.history.pushState({ page: 'contacts' }, '', location.href);
            showOnlyContacts();
        } else {
            hideAllOverlays();
        }
    }

    function populateProfileData() {
        if (!my) {
            my = { img: document.getElementById('header-img').src || 'https://c.top4top.io/p_3771lv9ra1.png', name: '' };
        }
        document.getElementById('profile-img-preview').src = my.img || '';
        const nameInput = document.getElementById('profile-name-input');
        nameInput.value = my.name || '';
        nameInput.readOnly = true;
    }

    function showProfile() {
        populateProfileData();
        hideAllOverlays();
        window.history.pushState({ page: 'profile' }, '', location.href);
        document.getElementById('profile-screen').style.display = 'flex';
    }

    function closeProfile() {
        document.getElementById('profile-screen').style.display = 'none';
        if (window.history.state && window.history.state.page === 'profile') {
            window.history.back();
        }
    }

    function showOnlyProfile() {
        populateProfileData();
        hideAllOverlays();
        document.getElementById('profile-screen').style.display = 'flex';
    }

    function triggerProfileImage() {
        document.getElementById('profile-file-input').click();
    }

    function editProfileName() {
        const nameInput = document.getElementById('profile-name-input');
        nameInput.readOnly = false;
        nameInput.focus();
    }

    function handleProfileFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            document.getElementById('profile-img-preview').src = reader.result;
        };
        reader.readAsDataURL(file);
    }

    function saveProfile() {
        const newName = document.getElementById('profile-name-input').value.trim();
        const newImg = document.getElementById('profile-img-preview').src;
        if (!newName) {
            showConfirm('الاسم مطلوب', 'يرجى إدخال اسم صالح.', true);
            return;
        }
        my.name = newName;
        my.img = newImg;
        localStorage.setItem('we_user_v2', JSON.stringify(my));
        document.getElementById('header-img').src = my.img;
        document.getElementById('profile-name-input').readOnly = true;
        closeProfile();
        showConfirm('تم الحفظ', 'تم حفظ البيانات بنجاح.', false);
    }

    function addNewContact() {
        const phone = document.getElementById('nc-phone').value.trim();
        const contactName = document.getElementById('nc-name').value.trim();
        if (!phone) {
            showConfirm('رقم مطلوب', 'يرجى إدخال رقم جهة الاتصال.', true);
            return;
        }
        if (!contactName) {
            showConfirm('اسم مطلوب', 'يرجى إدخال اسم جهة الاتصال.', true);
            return;
        }

        db.ref('users/' + phone).once('value', s => {
            if (s.exists()) {
                if (!myFriends.some(c => c.phone === phone)) {
                    myFriends.push({ phone, name: contactName });
                    localStorage.setItem('my_friends_list', JSON.stringify(myFriends));
                    loadMyContacts();
                    showConfirm('تمت الإضافة', 'تمت إضافة ' + contactName + ' لجهات اتصالك.', false);
                    document.getElementById('nc-name').value = '';
                    document.getElementById('nc-phone').value = '';
                } else {
                    showConfirm('موجود مسبقاً', 'هذا الرقم مضاف بالفعل.', false);
                }
            } else {
                showConfirm('غير موجود', 'هذا الرقم لا يستخدم We App حالياً.', true);
            }
        });
    }

    function loadMyContacts() {
        const l = document.getElementById('my-contacts-list');
        const count = document.getElementById('contacts-count');
        l.innerHTML = '';
        count.innerText = myFriends.length;
        if (myFriends.length === 0) {
            l.innerHTML = '<p class="no-contacts">لا توجد جهات اتصال محفوظة بعد. أضف جهة اتصال جديدة لتبدأ المحادثة.</p>';
            return;
        }
        myFriends.forEach(contact => {
            db.ref('users/' + contact.phone).once('value', s => {
                const u = s.val();
                if (u) {
                    const row = document.createElement('div');
                    row.className = 'user-row';

                    const info = document.createElement('div');
                    info.className = 'user-info';
                    info.addEventListener('click', () => startChat({ ...u, name: contact.name }));

                    const avatar = document.createElement('img');
                    avatar.src = u.img;

                    const meta = document.createElement('div');
                    meta.style.flex = '1';
                    const nameEl = document.createElement('b');
                    nameEl.textContent = contact.name || u.name;
                    const phoneEl = document.createElement('small');
                    phoneEl.textContent = contact.phone;
                    meta.append(nameEl, document.createElement('br'), phoneEl);

                    const deleteBtn = document.createElement('div');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = '🗑️';
                    deleteBtn.addEventListener('click', e => {
                        e.stopPropagation();
                        removeContact(contact.phone, contact.name);
                    });

                    info.appendChild(avatar);
                    info.appendChild(meta);
                    row.appendChild(info);
                    row.appendChild(deleteBtn);
                    l.appendChild(row);
                }
            });
        });
    }

    async function removeContact(phone, name) {
        if (await showConfirm('حذف جهة الاتصال؟', 'هل تريد إزالة ' + name + ' من قائمتك؟')) {
            myFriends = myFriends.filter(c => c.phone !== phone);
            localStorage.setItem('my_friends_list', JSON.stringify(myFriends));
            loadMyContacts();
        }
    }

    function loadRecentChats() {
        db.ref('chats').on('value', s => {
            const list = document.getElementById('recent-list');
            list.innerHTML = '';
            s.forEach(child => {
                const id = child.key;
                if (id.includes(my.phone) && !deletedChats.includes(id)) {
                    const parts = id.split('_');
                    const pNum = parts.length === 2 ? (parts[0] === my.phone ? parts[1] : parts[0]) : id.replace(my.phone, '').replace('_', '');
                    db.ref('users/' + pNum).once('value', uS => {
                        const u = uS.val();
                        const chatData = child.val() || {};
                        const msgs = Object.values(chatData);
                        if (u && msgs.length) {
                            const last = msgs[msgs.length - 1];
                            const row = document.createElement('div');
                            row.className = 'user-row';

                            const info = document.createElement('div');
                            info.className = 'user-info';
                            info.addEventListener('click', () => openChat(u));

                            const avatar = document.createElement('img');
                            avatar.src = u.img;

                            const meta = document.createElement('div');
                            meta.style.flex = '1';
                            const nameEl = document.createElement('b');
                            nameEl.textContent = u.name;
                            const lastEl = document.createElement('small');
                            lastEl.textContent = last.t || '';
                            meta.append(nameEl, document.createElement('br'), lastEl);

                            const deleteBtn = document.createElement('div');
                            deleteBtn.className = 'delete-btn';
                            deleteBtn.textContent = '🗑️';
                            deleteBtn.addEventListener('click', e => {
                                e.stopPropagation();
                                hideChat(id);
                            });

                            const isUnread = last.u !== my.phone && msgs.length > getChatSeenCount(id);
                            if (isUnread) {
                                const badge = document.createElement('span');
                                badge.className = 'unread-pill';
                                row.appendChild(badge);
                            }

                            info.appendChild(avatar);
                            info.appendChild(meta);
                            row.appendChild(info);
                            row.appendChild(deleteBtn);
                            list.appendChild(row);
                        }
                    });
                }
            });
        });
    }

    function startChat(u) { toggleContacts(false); openChat(u); }

    function openChat(u) {
        peer = u;
        const id = [my.phone, peer.phone].sort().join('_');
        if (deletedChats.includes(id)) {
            deletedChats = deletedChats.filter(x => x !== id);
            localStorage.setItem('deleted_chats', JSON.stringify(deletedChats));
        }
        window.history.pushState({ page: 'chat', peerPhone: u.phone }, '', location.href);
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('c-avatar').src = u.img;
        document.getElementById('c-name').innerText = u.name;
        document.getElementById('chat-status').innerText = u.status || 'متصل الآن';
        document.getElementById('c-input').value = '';
        updateInputMode();
        toggleEmojiPanel(false);
        db.ref('chats/' + id).on('value', s => {
            const box = document.getElementById('c-msgs');
            box.innerHTML = '';
            const msgs = [];
            s.forEach(mS => {
                const m = mS.val();
                msgs.push(m);
                const time = m.ts || '';
                const isRead = m.u === my.phone && m.r === true;
                const timeClass = isRead ? 'bubble-time read' : 'bubble-time';
                const meta = m.u === my.phone
                    ? `<span class="${timeClass}">${time} ✓✓</span>`
                    : `<span class="${timeClass}">${time}</span>`;
                let content = '';
                if (m.audio) {
                    content += `<audio controls src="${m.audio}" style="width:100%; margin-bottom:8px; border-radius: 14px;"></audio>`;
                }
                if (m.t) {
                    content += `<span>${m.t}</span>`;
                }
                if (!content) {
                    content = '<span>رسالة صوتية</span>';
                }
                box.innerHTML += `<div class="bubble ${m.u === my.phone ? 'me' : 'them'}">${content}${meta}</div>`;
            });
            updateChatSeenCount(id, msgs.length);
            markChatMessagesAsRead(id);
            box.scrollTop = box.scrollHeight;
        });
    }

    function updateInputMode() {
        const input = document.getElementById('c-input');
        const hasText = input.value.trim().length > 0;
        document.getElementById('send-btn').style.display = hasText ? 'flex' : 'none';
        document.getElementById('voice-btn').style.display = hasText ? 'none' : 'flex';
    }

    function handleChatInputKeydown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMsg();
        }
    }

    function toggleEmojiPanel(force) {
        const panel = document.getElementById('emoji-panel');
        if (force === true) {
            panel.style.display = 'flex';
            return;
        }
        if (force === false) {
            panel.style.display = 'none';
            return;
        }
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function insertEmoji(char) {
        const input = document.getElementById('c-input');
        input.value += char;
        input.focus();
        updateInputMode();
    }

    function openAttachmentPopup() {
        document.getElementById('chat-img-input').click();
    }

    function handleChatImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        showConfirm('إضافة صورة', 'تم اختيار صورة للمحادثة.', false);
        event.target.value = '';
    }

    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    function startVoiceRecording() {
        const btn = document.getElementById('voice-btn');
        const micIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14ZM19 11C19 14.31 16.31 17 13 17H11C7.69 17 5 14.31 5 11H3C3 15.42 6.58 19 11 19V22H13V19C17.42 19 21 15.42 21 11H19Z" fill="currentColor"/></svg>`;
        const stopIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>`;

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showConfirm('التسجيل غير مدعوم', 'متصفحك لا يدعم الوصول إلى الميكروفون.', false);
            return;
        }

        if (typeof MediaRecorder === 'undefined') {
            showConfirm('التسجيل غير مدعوم', 'متصفحك لا يدعم تسجيل الصوت عبر MediaRecorder.', false);
            return;
        }

        if (!window.isSecureContext && !location.protocol.startsWith('file')) {
            showConfirm('لا يوجد اتصال آمن', 'يجب فتح التطبيق عبر HTTPS أو localhost لتعمل ميزة التسجيل الصوتي.', false);
            return;
        }

        if (isRecording) {
            mediaRecorder?.stop();
            isRecording = false;
            btn.classList.remove('recording');
            btn.innerHTML = micIcon;
            return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                try {
                    mediaRecorder = new MediaRecorder(stream);
                } catch (mediaError) {
                    stream.getTracks().forEach(track => track.stop());
                    showConfirm('خطأ تسجيل الصوت', 'لم نتمكن من بدء التسجيل. جرب متصفحًا أحدث مثل Chrome أو Edge.', false);
                    console.error('MediaRecorder init failed:', mediaError);
                    return;
                }

                recordedChunks = [];
                mediaRecorder.ondataavailable = e => {
                    if (e.data && e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    if (recordedChunks.length === 0) {
                        btn.classList.remove('recording');
                        btn.innerHTML = micIcon;
                        return;
                    }
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    const audioUrl = await blobToDataURL(blob);
                    sendAudioMsg(audioUrl);
                    btn.classList.remove('recording');
                    btn.innerHTML = micIcon;
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
                btn.innerHTML = stopIcon;
            })
            .catch(error => {
                btn.classList.remove('recording');
                btn.innerHTML = micIcon;
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    showConfirm('تم رفض الميكروفون', 'يرجى السماح بالوصول إلى الميكروفون لتسجيل الصوت.', false);
                } else if (error.name === 'NotFoundError' || error.name === 'NotReadableError') {
                    showConfirm('الميكروفون غير متاح', 'لم يتم العثور على ميكروفون متصل أو يمكن الوصول إليه.', false);
                } else {
                    showConfirm('خطأ تسجيل الصوت', 'حدث خطأ أثناء تهيئة الميكروفون. جرب إعادة تحميل الصفحة أو استخدم متصفحًا آخر.', false);
                }
                console.error('Voice recording error:', error);
            });
    }

    function blobToDataURL(blob) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }

    function sendAudioMsg(audioUrl) {
        if (!peer) return;
        const id = [my.phone, peer.phone].sort().join('_');
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        db.ref('chats/' + id).push({ u: my.phone, audio: audioUrl, ts: time, r: false });
    }

    function sendMsg() {
        const input = document.getElementById('c-input');
        const txt = input.value.trim();
        if (!txt || !peer) return;
        const id = [my.phone, peer.phone].sort().join('_');
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        db.ref('chats/' + id).push({ u: my.phone, t: txt, ts: time, r: false });
        input.value = '';
        updateInputMode();
        toggleEmojiPanel(false);
    }

    function closeChat() {
        document.getElementById('chat-ui').style.display = 'none';
        if (window.history.state && window.history.state.page === 'chat') {
            window.history.back();
        }
    }

    async function hideChat(id) {
        if (await showConfirm("حذف المحادثة؟", "سيتم حذفها من شاشتك فقط.")) {
            deletedChats.push(id);
            localStorage.setItem('deleted_chats', JSON.stringify(deletedChats));
            loadRecentChats();
        }
    }

    async function logoutRequest() {
        if (await showConfirm("تسجيل خروج؟", "ستحتاج للدخول مرة أخرى.", true)) {
            localStorage.clear();
            my = null;
            showLogin();
        }
    }
</script>
</body>
</html>
