<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>عراق جات - الهوية الهاتفية</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --wa-green: #25d366; --wa-dark: #075e54; --wa-bg: #efeae2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--wa-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* شاشة التطبيق الرئيسي */
        .app-shell { width: 100%; height: 100vh; background: white; display: none; grid-template-columns: 350px 1fr; }
        .sidebar { border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .chat-area { background: var(--wa-bg); display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        @media (max-width: 768px) { .app-shell { grid-template-columns: 1fr; } .mobile-hidden { display: none; } }
    </style>
</head>
<body>

<div id="login-step" class="card">
    <img src="https://e.top4top.io/p_3771yr28m3.png" style="width: 100px; border-radius: 50%;">
    <h2 style="margin: 15px 0;">تسجيل الدخول</h2>
    <input type="tel" id="phone-input" placeholder="أدخل رقم الموبايل (مثلاً: 0770...)">
    <button onclick="checkPhone()">استمرار</button>
</div>

<div id="profile-step" class="card hidden">
    <h2>إنشاء بروفايل</h2>
    <input type="text" id="name-input" placeholder="اسم المستخدم">
    <input type="text" id="avatar-input" placeholder="رابط صورة الملف الشخصي">
    <button onclick="registerUser()">حفظ وفتح التطبيق</button>
</div>

<div id="app-shell" class="app-shell">
    <div class="sidebar">
        <div style="padding: 15px; background: #eee; font-weight: bold;">عراق جات - الفاهم</div>
        <div id="users-list" style="overflow-y: auto; flex: 1;"></div>
    </div>
    <div class="chat-area mobile-hidden" id="chat-panel">
        <div id="chat-header" style="padding: 15px; background: #eee; font-weight: bold;">اختر محادثة</div>
        <div id="msg-container" style="flex: 1; overflow-y: auto; padding: 20px;"></div>
        <div style="padding: 15px; background: #f0f2f5; display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="margin: 0;">
            <button onclick="sendMsg()" style="width: 60px;">➤</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://weapp-80-default-rtdb.firebaseio.com",
        projectId: "weapp-80",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myPhone = "";
    let myData = null;
    let targetPhone = "";

    // الخطوة 1: التحقق من الرقم
    function checkPhone() {
        myPhone = document.getElementById('phone-input').value.trim();
        if (myPhone.length < 10) return alert("يرجى إدخال رقم صحيح");

        db.ref('users/' + myPhone).once('value', snap => {
            if (snap.exists()) {
                myData = snap.val();
                loginSuccess();
            } else {
                document.getElementById('login-step').classList.add('hidden');
                document.getElementById('profile-step').classList.remove('hidden');
            }
        });
    }

    // الخطوة 2: تسجيل مستخدم جديد
    function registerUser() {
        const name = document.getElementById('name-input').value.trim();
        let img = document.getElementById('avatar-input').value.trim();
        if (!name) return alert("الاسم مطلوب");
        if (!img) img = "https://ui-avatars.com/api/?name=" + name;

        myData = { phone: myPhone, name: name, img: img };
        db.ref('users/' + myPhone).set(myData).then(() => {
            loginSuccess();
        });
    }

    function loginSuccess() {
        document.getElementById('login-step').classList.add('hidden');
        document.getElementById('profile-step').classList.add('hidden');
        document.getElementById('app-shell').style.display = 'grid';
        loadUsers();
    }

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                if (u.phone !== myPhone) {
                    const d = document.createElement('div');
                    d.style = "padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;";
                    d.innerHTML = `<img src="${u.img}" style="width:40px; height:40px; border-radius:50%;"> <b>${u.name}</b>`;
                    d.onclick = () => startChat(u);
                    list.appendChild(d);
                }
            });
        });
    }

    function startChat(u) {
        targetPhone = u.phone;
        document.getElementById('chat-panel').classList.remove('mobile-hidden');
        document.getElementById('chat-header').innerText = u.name;
        loadMsgs();
    }

    function loadMsgs() {
        const id = [myPhone, targetPhone].sort().join('_');
        db.ref('chats/' + id).on('value', snap => {
            const container = document.getElementById('msg-container');
            container.innerHTML = '';
            snap.forEach(mSnap => {
                const m = mSnap.val();
                const align = m.sender === myPhone ? 'flex-end' : 'flex-start';
                const bg = m.sender === myPhone ? '#dcf8c6' : '#fff';
                container.innerHTML += `<div style="align-self: ${align}; background: ${bg}; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">${m.text}</div>`;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !targetPhone) return;
        const id = [myPhone, targetPhone].sort().join('_');
        db.ref('chats/' + id).push({ sender: myPhone, text: input.value, time: Date.now() });
        input.value = '';
    }
</script>
</body>
</html>
